<!doctype html>

<html>
  <head>
    <title>Azur application</title>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <style>
      body { background: black; }
      canvas { box-sizing: border-box; display: block; margin: 0 auto; }
    </style>
  </head>

  <body>
    <!-- Elements used by the emscripten .js script -->
    <div class="spinner" id="spinner" style="display: none;"></div>
    <div class="emscripten" id="status"></div>
    <div class="emscripten">
      <progress id="progress" max="0" value="0" hidden=""></progress>
    </div>

    <div><canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1" width="1366" height="768" style="cursor: default;"></canvas></div>

    <script>
      var statusElement=document.getElementById("status"),
          progressElement=document.getElementById("progress"),
          spinnerElement=document.getElementById("spinner");
      var Module={
        preRun:[],
        postRun:[],
        print:function(e){
          arguments.length>1&&(e=Array.prototype.slice.call(arguments).join(" ")),console.log(e)},
        printErr:function(e){
          arguments.length>1&&(e=Array.prototype.slice.call(arguments).join(" ")),console.error(e)},
        canvas:function(){
          var e=document.getElementById("canvas");
          return e.addEventListener("webglcontextlost",(function(e){alert("WebGL context lost. You will need to reload the page."),e.preventDefault()}),!1),
                 e
        }(),
        setStatus:function(e){
          if(Module.setStatus.last||(Module.setStatus.last={time:Date.now(),text:""}),e!==Module.setStatus.last.text){
            var t=e.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/),n=Date.now();
            t&&n-Module.setStatus.last.time<30||(Module.setStatus.last.time=n,Module.setStatus.last.text=e,
            t?(e=t[1],progressElement.value=100*parseInt(t[2]),progressElement.max=100*parseInt(t[4]),progressElement.hidden=!1,spinnerElement.hidden=!1)
             :(progressElement.value=null,progressElement.max=null,progressElement.hidden=!0,e||(spinnerElement.style.display="none")),statusElement.innerHTML=e)
          }
        },
        totalDependencies:0,
        monitorRunDependencies:function(e){
          this.totalDependencies=Math.max(this.totalDependencies,e),
          Module.setStatus(e?"Preparing... ("+(this.totalDependencies-e)+"/"+this.totalDependencies+")"
                            :"All downloads complete.")
        }
      };
      Module.setStatus("Downloading..."),
      window.onerror=function(e){
        Module.setStatus("Exception thrown, see JavaScript console"),
        spinnerElement.style.display="none",
        Module.setStatus=function(e){e&&Module.printErr("[post-exception status] "+e)}
      }</script>
    <script async="" src="@AZUR_APP_TEMPLATE_JS@"></script>
  </body>
</html>
